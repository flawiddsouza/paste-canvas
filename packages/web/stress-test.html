<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Canvas — Stress Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #111; }
    #canvas-root { position: absolute; inset: 0; }
    #controls {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 9999;
    }
    #controls button {
      padding: 6px 14px; border: none; border-radius: 6px;
      background: #3b82f6; color: #fff; font-size: 13px; cursor: pointer;
    }
    #controls button:hover { background: #2563eb; }
    #stats {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(0,0,0,0.8); color: #e5e7eb;
      padding: 10px 14px; border-radius: 8px; font-family: monospace; font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button data-count="500">500 items</button>
    <button data-count="1000">1000 items</button>
    <button data-count="5000">5000 items</button>
    <button id="layout-toggle" data-layout="scatter">Layout: Scatter</button>
  </div>
  <div id="stats">
    FPS: <span id="stat-fps">–</span><br>
    Total: <span id="stat-total">0</span><br>
    Mounted: <span id="stat-mounted">0</span><br>
    Load: <span id="stat-load">–</span>
  </div>
  <div id="canvas-root"></div>
  <script type="module" src="/src/stress-test.ts"></script>
</body>
</html>
