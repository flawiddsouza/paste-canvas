name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Paste Canvas ${{ github.ref_name }}" \
            --notes "See the assets to download this version and install."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: '--bundles deb,appimage,rpm'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/tauri/src-tauri -> target'

      - name: Install dependencies
        run: bun install

      - name: Build lib
        run: bun run --cwd packages/lib build

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/tauri
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $bundle = "packages/tauri/src-tauri/target/release/bundle"

          Copy-Item "$bundle/nsis/Paste Canvas_${version}_x64-setup.exe" "PasteCanvas_${version}_windows_x64_setup.exe"
          Copy-Item "$bundle/msi/Paste Canvas_${version}_x64_en-US.msi" "PasteCanvas_${version}_windows_x64.msi"
          Compress-Archive -Path "packages/tauri/src-tauri/target/release/paste-canvas.exe" `
            -DestinationPath "PasteCanvas_${version}_windows_x64_portable.zip"

          gh release upload ${{ github.ref_name }} `
            "PasteCanvas_${version}_windows_x64_setup.exe" `
            "PasteCanvas_${version}_windows_x64.msi" `
            "PasteCanvas_${version}_windows_x64_portable.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          bundle="packages/tauri/src-tauri/target/universal-apple-darwin/release/bundle"

          cp "$bundle/dmg/Paste Canvas_${version}_universal.dmg" "PasteCanvas_${version}_macos_universal.dmg"
          cp "$bundle/macos/Paste Canvas.app.tar.gz" "PasteCanvas_${version}_macos_universal.app.tar.gz"

          gh release upload ${{ github.ref_name }} \
            "PasteCanvas_${version}_macos_universal.dmg" \
            "PasteCanvas_${version}_macos_universal.app.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          bundle="packages/tauri/src-tauri/target/release/bundle"

          cp "$bundle/deb/Paste Canvas_${version}_amd64.deb" "PasteCanvas_${version}_linux_x64.deb"
          cp "$bundle/appimage/Paste Canvas_${version}_amd64.AppImage" "PasteCanvas_${version}_linux_x64.AppImage"
          cp "$bundle/rpm/Paste Canvas-${version}-1.x86_64.rpm" "PasteCanvas_${version}_linux_x64.rpm"

          gh release upload ${{ github.ref_name }} \
            "PasteCanvas_${version}_linux_x64.deb" \
            "PasteCanvas_${version}_linux_x64.AppImage" \
            "PasteCanvas_${version}_linux_x64.rpm"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snap:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snap-build

      - name: Upload snap to release
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          cp "${{ steps.snap-build.outputs.snap }}" "PasteCanvas_${version}_linux_x64.snap"
          gh release upload ${{ github.ref_name }} "PasteCanvas_${version}_linux_x64.snap"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
