<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #252525;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      margin-right: 8px;
    }

    .btn {
      padding: 5px 12px;
      border: 1px solid #444;
      border-radius: 5px;
      background: #333;
      color: #ddd;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover { background: #444; border-color: #666; }
    .btn.active { background: #2d6be0; border-color: #4a88f0; color: #fff; }

    .sep { width: 1px; height: 24px; background: #444; }

    #zoom-label {
      font-size: 12px;
      color: #888;
      min-width: 42px;
      text-align: right;
    }

    /* ── Viewport ── */
    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    /* The infinite canvas surface */
    #canvas-surface {
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 0;
      transform-origin: 0 0;
    }

    /* Grid background drawn on the viewport itself */
    #viewport {
      background-color: #111;
      background-image:
        linear-gradient(#222 1px, transparent 1px),
        linear-gradient(90deg, #222 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: 0 0;
    }

    /* ── Items ── */
    .item {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .item-img:active { cursor: grabbing; }
    .item.selected .item-inner {
      outline: 2px solid #2d6be0;
      outline-offset: 2px;
    }

    /* ── Marquee selection box ── */
    #marquee {
      position: absolute;
      display: none;
      border: 1px solid #2d6be0;
      background: rgba(45, 107, 224, 0.10);
      pointer-events: none;
      z-index: 9999;
    }

    .item-inner {
      position: relative;
      border-radius: 4px;
      background: #2a2a2a;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }

    /* Image items */
    .item-img .item-inner {
      position: relative;
    }
    .item-img .item-inner img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      pointer-events: none;
      min-width: 80px;
    }

    .img-label {
      display: block;
      width: 100%;
      background: rgba(0,0,0,0.65);
      color: #eee;
      font-size: 13px;
      line-height: 1.5;
      padding: 5px 10px;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      border-radius: 0 0 4px 4px;
      overflow: hidden;
      cursor: text;
      min-height: 30px;
    }
    .img-label:placeholder-shown:not(:focus) {
      height: 0;
      min-height: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    /* Text / note items */
    .item-note .item-inner {
      background: #2b2b1e;
      border: 1px solid #554;
      min-width: 250px;
      min-height: 100px;
    }

    .note-handle {
      height: 22px;
      background: #3a3a28;
      border-bottom: 1px solid #554;
      border-radius: 4px 4px 0 0;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #776;
      font-size: 13px;
      letter-spacing: 3px;
      user-select: none;
      flex-shrink: 0;
    }
    .note-handle:active { cursor: grabbing; }

    .item-note textarea {
      display: block;
      width: 100%;
      min-width: 250px;
      min-height: 100px;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: #f0e68c;
      font-size: 14px;
      line-height: 1.5;
      padding: 10px 12px;
      font-family: inherit;
      cursor: text;
      overflow: auto;
    }

    /* Item toolbar (appears on hover / select) */
    .item-toolbar {
      position: absolute;
      top: -30px;
      left: 0;
      display: none;
      gap: 4px;
      background: #333;
      border: 1px solid #555;
      border-radius: 5px;
      padding: 3px 5px;
      z-index: 10;
      white-space: nowrap;
    }
    .item.toolbar-active .item-toolbar,
    .item.selected .item-toolbar {
      display: flex;
    }

    .item-btn {
      padding: 2px 8px;
      border: none;
      border-radius: 3px;
      background: #444;
      color: #ddd;
      font-size: 11px;
      cursor: pointer;
    }
    .item-btn:hover { background: #2d6be0; color: #fff; }
    .item-btn.danger:hover { background: #c0392b; }

    /* Resize handle */
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 18px; height: 18px;
      cursor: se-resize;
      background: linear-gradient(135deg, transparent 50%, #777 50%);
      border-radius: 0 0 4px 0;
      z-index: 2;
      touch-action: none;
    }
    .resize-handle:hover {
      background: linear-gradient(135deg, transparent 50%, #2d6be0 50%);
    }

    /* ── Tab bar ── */
    #tab-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 8px 0;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      cursor: pointer;
      font-size: 12px;
      color: #aaa;
      user-select: none;
      white-space: nowrap;
    }
    .tab.active { background: #333; color: #eee; border-color: #555; }
    .tab-name { outline: none; }
    .tab-close {
      background: none; border: none; color: #666;
      cursor: pointer; font-size: 14px; padding: 0 0 0 4px;
      line-height: 1;
    }
    .tab-close:hover { color: #e55; }
    #add-tab-btn {
      padding: 2px 9px;
      background: none; border: 1px solid #444;
      border-radius: 4px; color: #888;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
      margin-left: 4px;
    }
    #add-tab-btn:hover { background: #333; color: #ccc; }

    /* ── Port dots ── */
    .port {
      position: absolute; width: 10px; height: 10px;
      border-radius: 50%; background: #2d6be0; border: 2px solid #fff;
      cursor: crosshair; z-index: 20; opacity: 0;
      pointer-events: none; transition: opacity .1s;
    }
    .item:hover .port { opacity: 1; pointer-events: all; }
    .port-top    { top: -5px;    left: 50%; transform: translateX(-50%); }
    .port-right  { right: -5px;  top: 50%;  transform: translateY(-50%); }
    .port-bottom { bottom: -5px; left: 50%; transform: translateX(-50%); }
    .port-left   { left: -5px;   top: 50%;  transform: translateY(-50%); }

    /* ── Edge SVG layer ── */
    #edge-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: visible; pointer-events: none;
      transform-origin: 0 0;
    }
    .edge-path { fill: none; stroke: #888; stroke-width: 2; }
    .edge-path.selected { stroke: #2d6be0; }
    .edge-hit  { fill: none; stroke: transparent; stroke-width: 16;
                 pointer-events: stroke; cursor: pointer; }
    .edge-preview { fill: none; stroke: #2d6be0; stroke-width: 2;
                    stroke-dasharray: 6 4; pointer-events: none; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2d6be0;
      color: #fff;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      transition: transform .25s ease, opacity .25s ease;
      opacity: 0;
      z-index: 1000;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Paste Canvas</h1>
  <button class="btn" id="btn-note">+ Note</button>
  <button class="btn" id="btn-paste-img">Paste Image</button>
  <div class="sep"></div>
  <button class="btn" id="btn-clear-sel">Deselect</button>
  <button class="btn" id="btn-delete-sel">Delete Selected</button>
  <div class="sep"></div>
  <button class="btn" id="btn-reset-view">Reset View</button>
  <span id="zoom-label">100%</span>
  <span id="coords-label" style="font-size:11px;color:#555;min-width:80px">0, 0</span>
  <div class="sep"></div>
  <small style="color:#666;font-size:11px">Ctrl+V paste · Scroll zoom · Drag canvas to pan · Shift/Ctrl+drag to select</small>
</div>

<div id="tab-bar">
  <button id="add-tab-btn">+</button>
</div>

<div id="viewport">
  <div id="canvas-surface"></div>
  <svg id="edge-layer">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
        <polygon points="0 0, 6 2, 0 4" fill="context-stroke"/>
      </marker>
    </defs>
  </svg>
  <div id="marquee"></div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const surface = document.getElementById('canvas-surface');
const viewport = document.getElementById('viewport');
const zoomLabel = document.getElementById('zoom-label');
const coordsLabel = document.getElementById('coords-label');

let scale = 1;
let panX = 0, panY = 0;
let items = [];          // {el, type, x, y}
let selectedItems = new Set();
let itemCounter = 0;
let tabs = [];
let currentTabId = null;
let tabCounter = 0;
let placeOffset = 0;
let edges = [];
const selectedEdges = new Set();
let edgeCounter = 0;
const nodeEdgeMap = new Map(); // Map<itemId, Set<edgeRecord>>

// ========== UNDO / REDO ==========
const HISTORY_LIMIT = 100;
let undoStack = [];
let redoStack = [];
const tabHistory = new Map(); // Map<tabId, {undoStack, redoStack}>

function pushUndo(cmd) {
  undoStack.push(cmd);
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift().dispose?.();
  for (const c of redoStack) c.dispose?.();
  redoStack = [];
}

function saveTabHistory(tabId) {
  tabHistory.set(tabId, { undoStack, redoStack });
}

function restoreTabHistory(tabId) {
  const h = tabHistory.get(tabId);
  undoStack = h ? h.undoStack : [];
  redoStack = h ? h.redoStack : [];
}

function focusItems(ids) {
  const recs = ids.map(id => items.find(i => i.id === id)).filter(Boolean);
  if (!recs.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const rec of recs) {
    const w = rec.w || rec.el.offsetWidth;
    const h = rec.h || rec.el.offsetHeight;
    minX = Math.min(minX, rec.x);     minY = Math.min(minY, rec.y);
    maxX = Math.max(maxX, rec.x + w); maxY = Math.max(maxY, rec.y + h);
  }
  const vr = viewport.getBoundingClientRect();
  const pad = 48;
  const vx1 = minX * scale + panX, vy1 = minY * scale + panY;
  const vx2 = maxX * scale + panX, vy2 = maxY * scale + panY;
  if (vx1 >= pad && vy1 >= pad && vx2 <= vr.width - pad && vy2 <= vr.height - pad) return;
  panX = vr.width  / 2 - ((minX + maxX) / 2) * scale;
  panY = vr.height / 2 - ((minY + maxY) / 2) * scale;
  applyTransform();
  saveViewport();
}

function performUndo() {
  const cmd = undoStack.pop();
  if (!cmd) return;
  const ids = cmd.undo();
  redoStack.push(cmd);
  toast('Undone: ' + (cmd.label ?? 'action'));
  if (ids?.length) focusItems(ids);
}

function performRedo() {
  const cmd = redoStack.pop();
  if (!cmd) return;
  const ids = cmd.redo();
  undoStack.push(cmd);
  toast('Redone: ' + (cmd.label ?? 'action'));
  if (ids?.length) focusItems(ids);
}

function snapItem(rec) {
  return {
    id: rec.id,
    type: rec.type,
    x: rec.x,
    y: rec.y,
    w: rec.w,
    h: rec.h,
    zIndex: parseInt(rec.el.style.zIndex) || 0,
    text:          rec.type === 'note' ? rec.contentEl.value                       : undefined,
    contentWidth:  rec.type === 'note' ? rec.contentEl.offsetWidth                 : undefined,
    contentHeight: rec.type === 'note' ? rec.contentEl.offsetHeight                : undefined,
    blobUrl:    rec.type === 'img' ? rec.contentEl.src                             : undefined,
    imageWidth: rec.type === 'img' ? rec.contentEl.parentElement?.offsetWidth      : undefined,
    label:      rec.type === 'img' ? (rec.labelEl?.value ?? '')                    : undefined,
  };
}

function restoreItemSnap(snap) {
  const rec = createItem(snap.type, snap.x, snap.y, { id: snap.id, restore: true });
  rec.el.style.zIndex = snap.zIndex;
  if (snap.type === 'note') {
    rec.contentEl.value = snap.text || '';
    if (snap.contentWidth)  rec.contentEl.style.width  = snap.contentWidth  + 'px';
    if (snap.contentHeight) rec.contentEl.style.height = snap.contentHeight + 'px';
  } else {
    if (snap.w) rec.w = snap.w;
    if (snap.h) rec.h = snap.h;
    rec.contentEl.onload = () => {
      rec.w = rec.el.offsetWidth;
      rec.h = rec.el.offsetHeight;
      updateEdgesForItems(new Set([rec]));
    };
    rec.contentEl.src = snap.blobUrl;
    if (snap.imageWidth) rec.contentEl.parentElement.style.width = snap.imageWidth + 'px';
    if (snap.label && rec.labelEl) rec.labelEl.value = snap.label;
  }
  saveItem(rec);
  return rec;
}

function snapEdge(er) {
  return { id: er.id, tabId: er.tabId,
           fromNode: er.fromNode, fromSide: er.fromSide,
           toNode:   er.toNode,   toSide:   er.toSide };
}

function restoreEdgeSnap(snap) {
  const fromRec = items.find(i => i.id === snap.fromNode);
  const toRec   = items.find(i => i.id === snap.toNode);
  if (!fromRec || !toRec) return null;
  const er = { ...snap };
  edges.push(er);
  if (!nodeEdgeMap.has(fromRec.id)) nodeEdgeMap.set(fromRec.id, new Set());
  if (!nodeEdgeMap.has(toRec.id))   nodeEdgeMap.set(toRec.id,   new Set());
  nodeEdgeMap.get(fromRec.id).add(er);
  nodeEdgeMap.get(toRec.id).add(er);
  renderEdge(er);
  saveEdge(er);
  return er;
}

// ── Transform ──────────────────────────────────────────────────────────────
function applyTransform() {
  const t = `translate(${panX}px, ${panY}px) scale(${scale})`;
  surface.style.transform = t;
  edgeLayer.style.transform = t;
  zoomLabel.textContent = Math.round(scale * 100) + '%';
  const gs = 40 * scale;
  viewport.style.backgroundSize = `${gs}px ${gs}px`;
  viewport.style.backgroundPosition = `${panX % gs}px ${panY % gs}px`;
  coordsLabel.textContent = `${Math.round(-panX / scale)}, ${Math.round(-panY / scale)}`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, ms = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

function viewportCenter() {
  const r = viewport.getBoundingClientRect();
  return {
    x: (r.width  / 2 - panX) / scale,
    y: (r.height / 2 - panY) / scale,
  };
}

function clearEdgeSelection() {
  for (const e of selectedEdges) e.pathEl.classList.remove('selected');
  selectedEdges.clear();
}
function clearSelection() {
  for (const item of selectedItems) item.el.classList.remove('selected');
  selectedItems.clear();
  clearEdgeSelection();
}
function addToSelection(item) {
  selectedItems.add(item);
  item.el.classList.add('selected');
  item.el.style.zIndex = ++itemCounter;
}
function selectItem(item) {
  clearSelection();
  if (item) addToSelection(item);
}
function toggleSelection(item) {
  if (selectedItems.has(item)) {
    selectedItems.delete(item);
    item.el.classList.remove('selected');
  } else {
    clearEdgeSelection();
    addToSelection(item);
  }
}

// ── Edge helpers ───────────────────────────────────────────────────────────
const edgeLayer = document.getElementById('edge-layer');

function getPortPos(record, side) {
  const x = record.x;
  const y = record.y;
  const w = record.w || record.el.offsetWidth;
  const h = record.h || record.el.offsetHeight;
  switch (side) {
    case 'top':    return { x: x + w / 2, y };
    case 'right':  return { x: x + w,     y: y + h / 2 };
    case 'bottom': return { x: x + w / 2, y: y + h };
    case 'left':   return { x,             y: y + h / 2 };
  }
}

function edgePathD(from, fromSide, to, toSide) {
  const dist   = Math.hypot(to.x - from.x, to.y - from.y);
  const offset = Math.min(Math.max(dist * 0.4, 40), 200);
  const dirs   = { top: [0,-1], right: [1,0], bottom: [0,1], left: [-1,0] };
  const [fdx, fdy] = dirs[fromSide];
  const [tdx, tdy] = dirs[toSide];
  const cp1x = from.x + fdx * offset, cp1y = from.y + fdy * offset;
  const cp2x = to.x   + tdx * offset, cp2y = to.y   + tdy * offset;
  return `M ${from.x} ${from.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${to.x} ${to.y}`;
}

function updateEdgePath(edgeRec) {
  const fromRec = items.find(i => i.id === edgeRec.fromNode);
  const toRec   = items.find(i => i.id === edgeRec.toNode);
  if (!fromRec || !toRec) return;
  const d = edgePathD(getPortPos(fromRec, edgeRec.fromSide), edgeRec.fromSide,
                       getPortPos(toRec,   edgeRec.toSide),   edgeRec.toSide);
  edgeRec.pathEl.setAttribute('d', d);
  edgeRec.hitEl.setAttribute('d', d);
}

function renderEdge(edgeRec) {
  const g    = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const hit  = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('class', 'edge-path');
  path.setAttribute('marker-end', 'url(#arrowhead)');
  hit.setAttribute('class', 'edge-hit');
  g.appendChild(path);
  g.appendChild(hit);
  edgeLayer.appendChild(g);
  edgeRec.pathEl  = path;
  edgeRec.hitEl   = hit;
  edgeRec.groupEl = g;
  hit.addEventListener('click', (e) => {
    e.stopPropagation();
    selectEdge(edgeRec, e.shiftKey || e.ctrlKey);
  });
  updateEdgePath(edgeRec);
}

function selectEdge(edgeRec, multi = false) {
  for (const item of selectedItems) item.el.classList.remove('selected');
  selectedItems.clear();
  if (!multi) clearEdgeSelection();
  if (edgeRec) {
    if (multi && selectedEdges.has(edgeRec)) {
      selectedEdges.delete(edgeRec);
      edgeRec.pathEl.classList.remove('selected');
    } else {
      selectedEdges.add(edgeRec);
      edgeRec.pathEl.classList.add('selected');
    }
  }
}

function updateEdgesForItems(itemSet) {
  const seen = new Set();
  for (const item of itemSet) {
    const connected = nodeEdgeMap.get(item.id);
    if (!connected) continue;
    for (const edgeRec of connected) {
      if (!seen.has(edgeRec)) { seen.add(edgeRec); updateEdgePath(edgeRec); }
    }
  }
}

function saveEdge(edgeRec) {
  dbPut('edges', { id: edgeRec.id, tabId: edgeRec.tabId,
    fromNode: edgeRec.fromNode, fromSide: edgeRec.fromSide,
    toNode:   edgeRec.toNode,   toSide:   edgeRec.toSide });
}

function createEdge(fromRec, fromSide, toRec, toSide) {
  if (fromRec === toRec) return;
  if (edges.find(e => e.fromNode === fromRec.id && e.toNode === toRec.id &&
                      e.fromSide === fromSide   && e.toSide === toSide)) return;
  const edgeRec = { id: ++edgeCounter, tabId: currentTabId,
    fromNode: fromRec.id, fromSide, toNode: toRec.id, toSide };
  edges.push(edgeRec);
  if (!nodeEdgeMap.has(fromRec.id)) nodeEdgeMap.set(fromRec.id, new Set());
  if (!nodeEdgeMap.has(toRec.id))   nodeEdgeMap.set(toRec.id,   new Set());
  nodeEdgeMap.get(fromRec.id).add(edgeRec);
  nodeEdgeMap.get(toRec.id).add(edgeRec);
  renderEdge(edgeRec);
  saveEdge(edgeRec);
  const snap = snapEdge(edgeRec);
  pushUndo({
    label: 'connect',
    undo() { const er = edges.find(e => e.id === snap.id); if (er) removeEdge(er); return [snap.fromNode, snap.toNode]; },
    redo() { restoreEdgeSnap(snap); return [snap.fromNode, snap.toNode]; },
  });
}

function removeEdge(edgeRec) {
  edgeRec.groupEl.remove();
  edges = edges.filter(e => e !== edgeRec);
  nodeEdgeMap.get(edgeRec.fromNode)?.delete(edgeRec);
  nodeEdgeMap.get(edgeRec.toNode)?.delete(edgeRec);
  selectedEdges.delete(edgeRec);
  dbDelete('edges', edgeRec.id);
}

function findDropTarget(clientX, clientY, excludeRecord) {
  for (const item of items) {
    if (item === excludeRecord) continue;
    const r = item.el.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
      const cx = (clientX - r.left) / r.width;
      const cy = (clientY - r.top)  / r.height;
      const dists = { top: cy, bottom: 1 - cy, left: cx, right: 1 - cx };
      const side = Object.entries(dists).sort(([,a],[,b]) => a - b)[0][0];
      return { record: item, side };
    }
  }
  return null;
}

function startEdgeDrag(fromRecord, fromSide, e) {
  clearSelection();
  const pid = e.pointerId;
  const preview = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  preview.setAttribute('class', 'edge-preview');
  edgeLayer.appendChild(preview);

  const oppSide = { top: 'bottom', bottom: 'top', left: 'right', right: 'left' };

  const onMove = (ev) => {
    if (ev.pointerId !== pid) return;
    const vr = viewport.getBoundingClientRect();
    const cx = (ev.clientX - vr.left - panX) / scale;
    const cy = (ev.clientY - vr.top  - panY) / scale;
    const from   = getPortPos(fromRecord, fromSide);
    const target = findDropTarget(ev.clientX, ev.clientY, fromRecord);
    const to     = target ? getPortPos(target.record, target.side) : { x: cx, y: cy };
    const toSide = target ? target.side : oppSide[fromSide];
    preview.setAttribute('d', edgePathD(from, fromSide, to, toSide));
  };

  const onUp = (ev) => {
    if (ev.pointerId !== pid) return;
    preview.remove();
    const target = findDropTarget(ev.clientX, ev.clientY, fromRecord);
    if (target) createEdge(fromRecord, fromSide, target.record, target.side);
    document.removeEventListener('pointermove',   onMove);
    document.removeEventListener('pointerup',     onUp);
    document.removeEventListener('pointercancel', onUp);
  };

  document.addEventListener('pointermove',   onMove);
  document.addEventListener('pointerup',     onUp);
  document.addEventListener('pointercancel', onUp);
}

// ── Create item ────────────────────────────────────────────────────────────
function createItem(type, x, y, opts = {}) {
  const id = opts.id != null ? opts.id : ++itemCounter;
  if (opts.id != null) itemCounter = Math.max(itemCounter, opts.id);
  const el = document.createElement('div');
  el.className = `item item-${type}`;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.zIndex = id;

  // Inner wrapper
  const inner = document.createElement('div');
  inner.className = 'item-inner';

  // Item-specific content
  let contentEl;
  let labelEl = null;
  if (type === 'img') {
    contentEl = document.createElement('img');
    inner.appendChild(contentEl);

    labelEl = document.createElement('textarea');
    labelEl.className = 'img-label';
    labelEl.placeholder = 'Label…';
    labelEl.rows = 1;
    inner.appendChild(labelEl);


    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    inner.appendChild(rh);

    rh.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      rh.setPointerCapture(e.pointerId);

      const startX = e.clientX;
      const startW = inner.offsetWidth;

      const onMove = (ev) => {
        const dw = (ev.clientX - startX) / scale;
        inner.style.width = Math.max(80, startW + dw) + 'px';
      };
      const onUp = () => {
        const endW = inner.offsetWidth;
        saveItem(record);
        updateEdgesForItems(new Set([record]));
        if (endW !== startW) {
          const itemId = record.id;
          pushUndo({
            label: 'resize',
            undo() { const r = items.find(i => i.id === itemId); if (!r) return []; r.contentEl.parentElement.style.width = startW + 'px'; saveItem(r); updateEdgesForItems(new Set([r])); return [itemId]; },
            redo() { const r = items.find(i => i.id === itemId); if (!r) return []; r.contentEl.parentElement.style.width = endW   + 'px'; saveItem(r); updateEdgesForItems(new Set([r])); return [itemId]; },
          });
        }
        rh.removeEventListener('pointermove',   onMove);
        rh.removeEventListener('pointerup',     onUp);
        rh.removeEventListener('pointercancel', onUp);
      };
      rh.addEventListener('pointermove',   onMove);
      rh.addEventListener('pointerup',     onUp);
      rh.addEventListener('pointercancel', onUp);
    });
  } else {
    const handle = document.createElement('div');
    handle.className = 'note-handle';
    handle.textContent = '⠿⠿⠿';
    inner.appendChild(handle);
    contentEl = document.createElement('textarea');
    contentEl.placeholder = 'Type a note…';
    contentEl.rows = 3;
    inner.appendChild(contentEl);
    // Resize handle
    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    inner.appendChild(rh);

    rh.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      rh.setPointerCapture(e.pointerId);

      const startX = e.clientX;
      const startY = e.clientY;
      const startW = contentEl.offsetWidth;
      const startH = contentEl.offsetHeight;

      const onMove = (ev) => {
        const dw = (ev.clientX - startX) / scale;
        const dh = (ev.clientY - startY) / scale;
        contentEl.style.width  = Math.max(250, startW + dw) + 'px';
        contentEl.style.height = Math.max(100, startH + dh) + 'px';
      };
      const onUp = () => {
        const endW = contentEl.offsetWidth;
        const endH = contentEl.offsetHeight;
        saveItem(record);
        updateEdgesForItems(new Set([record]));
        if (endW !== startW || endH !== startH) {
          const itemId = record.id;
          pushUndo({
            label: 'resize',
            undo() { const r = items.find(i => i.id === itemId); if (!r) return []; r.contentEl.style.width = startW + 'px'; r.contentEl.style.height = startH + 'px'; saveItem(r); updateEdgesForItems(new Set([r])); return [itemId]; },
            redo() { const r = items.find(i => i.id === itemId); if (!r) return []; r.contentEl.style.width = endW   + 'px'; r.contentEl.style.height = endH   + 'px'; saveItem(r); updateEdgesForItems(new Set([r])); return [itemId]; },
          });
        }
        rh.removeEventListener('pointermove',   onMove);
        rh.removeEventListener('pointerup',     onUp);
        rh.removeEventListener('pointercancel', onUp);
      };
      rh.addEventListener('pointermove',   onMove);
      rh.addEventListener('pointerup',     onUp);
      rh.addEventListener('pointercancel', onUp);
    });
  }

  // Per-item toolbar
  const itb = document.createElement('div');
  itb.className = 'item-toolbar';
  itb.addEventListener('pointerdown', (e) => e.stopPropagation());


  if (type === 'img') {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'item-btn';
    copyBtn.textContent = 'Copy Image';
    copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyImage(contentEl); });
    itb.appendChild(copyBtn);

    const labelBtn = document.createElement('button');
    labelBtn.className = 'item-btn';
    labelBtn.textContent = 'Label';
    labelBtn.addEventListener('click', (e) => { e.stopPropagation(); labelEl.focus(); });
    itb.appendChild(labelBtn);
  } else {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'item-btn';
    copyBtn.textContent = 'Copy Text';
    copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyText(contentEl); });
    itb.appendChild(copyBtn);
  }

  const delBtn = document.createElement('button');
  delBtn.className = 'item-btn danger';
  delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const snap = snapItem(record);
    const edgeSnaps = [...(nodeEdgeMap.get(record.id) ?? [])].map(snapEdge);
    removeItem(record, { skipRevoke: true });
    pushUndo({
      label: 'delete ' + (snap.type === 'img' ? 'image' : 'note'),
      undo() { restoreItemSnap(snap); for (const es of edgeSnaps) restoreEdgeSnap(es); return [snap.id]; },
      redo() { const r = items.find(i => i.id === snap.id); if (r) removeItem(r, { skipRevoke: true }); return []; },
      dispose() { if (snap.blobUrl && !items.find(i => i.id === snap.id)) URL.revokeObjectURL(snap.blobUrl); },
    });
  });
  itb.appendChild(delBtn);

  el.appendChild(itb);
  el.appendChild(inner);
  surface.appendChild(el);

  const record = { id, el, type, x, y, contentEl, labelEl };
  items.push(record);

  makeDraggable(record);

  if (type === 'note') {
    let noteTimer = null;
    contentEl.addEventListener('input', () => {
      clearTimeout(noteTimer);
      noteTimer = setTimeout(() => saveItem(record), 600);
    });
  }
  if (type === 'img' && labelEl) {
    function autoGrowLabel() {
      if (!labelEl.value) {
        labelEl.style.height = '';
      } else {
        labelEl.style.height = 'auto';
        labelEl.style.height = labelEl.scrollHeight + 'px';
      }
    }
    let labelTimer = null;
    labelEl.addEventListener('input', () => {
      autoGrowLabel();
      clearTimeout(labelTimer);
      labelTimer = setTimeout(() => saveItem(record), 600);
    });
    record._autoGrowLabel = autoGrowLabel;
  }
  // Port dots for edge connections
  for (const side of ['top', 'right', 'bottom', 'left']) {
    const dot = document.createElement('div');
    dot.className = `port port-${side}`;
    dot.addEventListener('pointerdown', ev => {
      if (ev.button === 1) return; // middle click — let viewport handle panning
      ev.stopPropagation(); ev.preventDefault();
      startEdgeDrag(record, side, ev);
    });
    el.appendChild(dot);
  }

  if (!opts.restore) {
    selectItem(record);
    if (type === 'note') {
      contentEl.focus();
      saveItem(record);
    }
  }
  return record;
}

// ── IndexedDB persistence ───────────────────────────────────────────────────
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('paste-canvas', 3);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('items')) d.createObjectStore('items', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('meta'))  d.createObjectStore('meta',  { keyPath: 'key' });
      if (!d.objectStoreNames.contains('tabs'))  d.createObjectStore('tabs',  { keyPath: 'id' });
      if (!d.objectStoreNames.contains('edges')) d.createObjectStore('edges', { keyPath: 'id' });
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = (e) => reject(e.target.error);
  });
}

function dbPut(store, value) {
  if (!db) return;
  db.transaction(store, 'readwrite').objectStore(store).put(value);
}

function dbDelete(store, key) {
  if (!db) return;
  db.transaction(store, 'readwrite').objectStore(store).delete(key);
}

function dbGetAll(store) {
  return new Promise((resolve) => {
    if (!db) return resolve([]);
    const req = db.transaction(store).objectStore(store).getAll();
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = () => resolve([]);
  });
}

function dbGet(store, key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const req = db.transaction(store).objectStore(store).get(key);
    req.onsuccess = (e) => resolve(e.target.result ?? null);
    req.onerror   = () => resolve(null);
  });
}

async function saveItem(record) {
  if (!db) return;
  record.w = record.el.offsetWidth;
  record.h = record.el.offsetHeight;
  const data = {
    id:     record.id,
    type:   record.type,
    tabId:  currentTabId,
    x:      record.x,
    y:      record.y,
    w:      record.w,
    h:      record.h,
    zIndex: parseInt(record.el.style.zIndex) || 0,
  };
  if (record.type === 'img') {
    const src = record.contentEl.src;
    if (!src) return;
    try {
      const res  = await fetch(src);
      const blob = await res.blob();
      data.imageData = await blob.arrayBuffer();
      data.imageType = blob.type || 'image/png';
      data.width     = record.contentEl.parentElement.offsetWidth;
      data.label     = record.labelEl ? record.labelEl.value : '';
    } catch { return; }
  } else {
    data.text   = record.contentEl.value;
    data.width  = record.contentEl.offsetWidth;
    data.height = record.contentEl.offsetHeight;
  }
  dbPut('items', data);
}

let vpSaveTimer = null;
function saveViewport() {
  clearTimeout(vpSaveTimer);
  vpSaveTimer = setTimeout(() => {
    if (currentTabId !== null)
      dbPut('meta', { key: `viewport-${currentTabId}`, panX, panY, scale });
  }, 500);
}

function unloadItems(protectedBlobs = new Set()) {
  for (const e of edges) e.groupEl?.remove();
  edges = []; selectedEdges.clear(); nodeEdgeMap.clear();
  for (const rec of items) {
    if (rec.type === 'img' && rec.contentEl?.src?.startsWith('blob:') &&
        !protectedBlobs.has(rec.contentEl.src))
      URL.revokeObjectURL(rec.contentEl.src);
    rec.el.remove();
  }
  items = [];
  selectedItems.clear();
}

async function loadTab(tabId) {
  const allItems = await dbGetAll('items');
  // Items with no tabId are legacy data — migrate them to the first tab
  const firstTabId = tabs[0]?.id;
  const tabItems = allItems.filter(s =>
    s.tabId === tabId || (s.tabId === undefined && tabId === firstTabId)
  );
  tabItems.sort((a, b) => a.zIndex - b.zIndex);
  for (const saved of tabItems) {
    let rec;
    if (saved.type === 'img') {
      const blob = new Blob([saved.imageData], { type: saved.imageType || 'image/png' });
      rec = createItem('img', saved.x, saved.y, { restore: true });
      rec.contentEl.parentElement.style.width = (saved.width || 300) + 'px';
      rec.el.style.zIndex = saved.zIndex;
      rec.contentEl.onload = () => {
        rec.w = rec.el.offsetWidth;
        rec.h = rec.el.offsetHeight;
        updateEdgesForItems(new Set([rec]));
      };
      rec.contentEl.src = URL.createObjectURL(blob);
      if (saved.label && rec.labelEl) {
        rec.labelEl.value = saved.label;
        if (rec._autoGrowLabel) rec._autoGrowLabel();
      }
    } else {
      rec = createItem('note', saved.x, saved.y, { restore: true });
      rec.contentEl.value = saved.text || '';
      if (saved.width)  rec.contentEl.style.width  = saved.width  + 'px';
      if (saved.height) rec.contentEl.style.height = saved.height + 'px';
      rec.el.style.zIndex = saved.zIndex;
    }
    rec.id = saved.id;
    if (saved.w != null) rec.w = saved.w;
    if (saved.h != null) rec.h = saved.h;
  }
  // Load edges for this tab
  const savedEdges = (await dbGetAll('edges')).filter(e => e.tabId === tabId);
  if (savedEdges.length) edgeCounter = Math.max(edgeCounter, ...savedEdges.map(e => e.id));
  for (const saved of savedEdges) {
    const fromRec = items.find(i => i.id === saved.fromNode);
    const toRec   = items.find(i => i.id === saved.toNode);
    if (!fromRec || !toRec) continue;
    const edgeRec = { id: saved.id, tabId: saved.tabId,
      fromNode: saved.fromNode, fromSide: saved.fromSide,
      toNode:   saved.toNode,   toSide:   saved.toSide };
    edges.push(edgeRec);
    if (!nodeEdgeMap.has(fromRec.id)) nodeEdgeMap.set(fromRec.id, new Set());
    if (!nodeEdgeMap.has(toRec.id))   nodeEdgeMap.set(toRec.id,   new Set());
    nodeEdgeMap.get(fromRec.id).add(edgeRec);
    nodeEdgeMap.get(toRec.id).add(edgeRec);
    renderEdge(edgeRec);
  }

  // Load viewport — fall back to old 'viewport' key for migration
  let vpMeta = await dbGet('meta', `viewport-${tabId}`);
  if (!vpMeta && tabId === firstTabId) vpMeta = await dbGet('meta', 'viewport');
  panX = vpMeta?.panX ?? 0;
  panY = vpMeta?.panY ?? 0;
  scale = vpMeta?.scale ?? 1;
  applyTransform();
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.querySelectorAll('.tab').forEach(el => el.remove());
  const addBtn = document.getElementById('add-tab-btn');
  for (const tab of tabs) {
    const tabEl = document.createElement('div');
    tabEl.className = 'tab' + (tab.id === currentTabId ? ' active' : '');

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tab-name';
    nameSpan.textContent = tab.name;

    nameSpan.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      nameSpan.contentEditable = 'true';
      nameSpan.focus();
      const range = document.createRange();
      range.selectNodeContents(nameSpan);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    const commitName = () => {
      nameSpan.contentEditable = 'false';
      const newName = nameSpan.textContent.trim() || tab.name;
      nameSpan.textContent = newName;
      tab.name = newName;
      dbPut('tabs', tab);
    };
    nameSpan.addEventListener('blur', commitName);
    nameSpan.addEventListener('keydown', (e) => {
      if (e.key === 'Enter')  { e.preventDefault(); commitName(); nameSpan.blur(); }
      if (e.key === 'Escape') { nameSpan.textContent = tab.name; nameSpan.contentEditable = 'false'; nameSpan.blur(); }
    });

    tabEl.addEventListener('click', () => {
      if (nameSpan.contentEditable === 'true') return;
      switchTab(tab.id);
    });
    tabEl.appendChild(nameSpan);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '×';
    closeBtn.title = 'Close tab';
    closeBtn.style.display = tabs.length === 1 ? 'none' : '';
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTab(tab.id); });
    tabEl.appendChild(closeBtn);

    bar.insertBefore(tabEl, addBtn);
  }
}

async function switchTab(tabId) {
  if (tabId === currentTabId) return;
  placeOffset = 0;
  clearTimeout(vpSaveTimer);
  dbPut('meta', { key: `viewport-${currentTabId}`, panX, panY, scale });
  saveTabHistory(currentTabId);
  const protectedBlobs = new Set();
  for (const cmd of [...undoStack, ...redoStack]) {
    if (cmd._blobUrl) protectedBlobs.add(cmd._blobUrl);
  }
  unloadItems(protectedBlobs);
  currentTabId = tabId;
  dbPut('meta', { key: 'activeTab', tabId });
  renderTabBar();
  await loadTab(tabId);
  restoreTabHistory(tabId);
}

async function createTab(name) {
  const id = ++tabCounter;
  const tab = { id, name, order: tabs.length };
  tabs.push(tab);
  dbPut('tabs', tab);
  await switchTab(id);
}

async function deleteTab(tabId) {
  if (tabs.length <= 1) { toast("Can't delete the last tab"); return; }
  const idx = tabs.findIndex(t => t.id === tabId);
  const nextTab = tabs[idx + 1] ?? tabs[idx - 1];
  if (tabId === currentTabId) await switchTab(nextTab.id);
  const allItems = await dbGetAll('items');
  for (const item of allItems) {
    if (item.tabId === tabId) dbDelete('items', item.id);
  }
  dbDelete('meta', `viewport-${tabId}`);
  dbDelete('tabs', tabId);
  const oldHistory = tabHistory.get(tabId);
  if (oldHistory) {
    for (const c of [...oldHistory.undoStack, ...oldHistory.redoStack]) c.dispose?.();
    tabHistory.delete(tabId);
  }
  tabs = tabs.filter(t => t.id !== tabId);
  renderTabBar();
}

async function restoreAll() {
  db = await openDB();
  // Set itemCounter and edgeCounter from all stored data
  const allItems = await dbGetAll('items');
  for (const item of allItems) itemCounter = Math.max(itemCounter, item.id);
  const allEdges = await dbGetAll('edges');
  for (const edge of allEdges) edgeCounter = Math.max(edgeCounter, edge.id);

  let savedTabs = await dbGetAll('tabs');
  if (savedTabs.length === 0) {
    const defaultTab = { id: 1, name: 'Board 1', order: 0 };
    dbPut('tabs', defaultTab);
    savedTabs = [defaultTab];
    tabCounter = 1;
  } else {
    tabCounter = Math.max(...savedTabs.map(t => t.id));
  }
  tabs = savedTabs.sort((a, b) => a.order - b.order);

  const activeMeta = await dbGet('meta', 'activeTab');
  currentTabId = activeMeta?.tabId ?? tabs[0].id;
  if (!tabs.find(t => t.id === currentTabId)) currentTabId = tabs[0].id;

  renderTabBar();
  await loadTab(currentTabId);
}

// ── Remove ─────────────────────────────────────────────────────────────────
function removeItem(record, { skipRevoke = false } = {}) {
  const connected = nodeEdgeMap.get(record.id);
  if (connected) { for (const e of [...connected]) removeEdge(e); }
  nodeEdgeMap.delete(record.id);
  dbDelete('items', record.id);
  if (!skipRevoke && record.type === 'img' && record.contentEl.src.startsWith('blob:')) {
    URL.revokeObjectURL(record.contentEl.src);
  }
  record.el.remove();
  items = items.filter(i => i !== record);
  selectedItems.delete(record);
  record.el.classList.remove('selected');
}

// ── Copy helpers ───────────────────────────────────────────────────────────
async function copyImage(imgEl) {
  try {
    const res = await fetch(imgEl.src);
    const blob = await res.blob();
    // Convert to PNG for clipboard compatibility
    const bmp = await createImageBitmap(blob);
    const cvs = document.createElement('canvas');
    cvs.width = bmp.width; cvs.height = bmp.height;
    cvs.getContext('2d').drawImage(bmp, 0, 0);
    cvs.toBlob(async (pngBlob) => {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': pngBlob })
      ]);
      toast('Image copied to clipboard!');
    }, 'image/png');
  } catch (err) {
    toast('Copy failed: ' + err.message);
  }
}

async function copyText(textarea) {
  const text = textarea.value;
  if (!text.trim()) { toast('Nothing to copy'); return; }
  await navigator.clipboard.writeText(text);
  toast('Text copied to clipboard!');
}

// ── Shared image placer ────────────────────────────────────────────────────
function placeImage(url) {
  const c   = viewportCenter();
  const rec = createItem('img', c.x - 150, c.y - 100);
  rec.contentEl.onload = () => {
    const w = rec.contentEl.naturalWidth;
    rec.contentEl.parentElement.style.width = w + 'px';
    rec.x = c.x - w / 2;
    rec.y = c.y - rec.contentEl.naturalHeight / 2;
    rec.el.style.left = rec.x + 'px';
    rec.el.style.top  = rec.y + 'px';
    saveItem(rec);
    const snap = snapItem(rec);
    pushUndo({
      label: 'create image',
      _blobUrl: snap.blobUrl,
      undo() { const r = items.find(i => i.id === snap.id); if (r) removeItem(r, { skipRevoke: true }); return []; },
      redo() { restoreItemSnap(snap); return [snap.id]; },
      dispose() { if (!items.find(i => i.id === snap.id)) URL.revokeObjectURL(snap.blobUrl); },
    });
  };
  rec.contentEl.src = url;
}

// ── Paste handler ──────────────────────────────────────────────────────────
document.addEventListener('paste', (e) => {
  if (e.target.tagName === 'TEXTAREA') return;

  const items_dt = e.clipboardData.items;
  let handled = false;

  for (const item of items_dt) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      placeImage(URL.createObjectURL(item.getAsFile()));
      handled = true;
      break;
    }
  }

  if (!handled) {
    for (const item of items_dt) {
      if (item.kind === 'string' && item.type === 'text/plain') {
        item.getAsString((text) => {
          if (!text.trim()) return;
          const c   = viewportCenter();
          const off = placeOffset++ * 24;
          const rec = createItem('note', c.x - 90 + off, c.y - 40 + off);
          rec.contentEl.value = text;
          saveItem(rec);
          const snap = snapItem(rec);
          pushUndo({
            label: 'create note',
            undo() { const r = items.find(i => i.id === snap.id); if (r) removeItem(r); return []; },
            redo() { restoreItemSnap(snap); return [snap.id]; },
          });
        });
        handled = true;
        break;
      }
    }
  }
});

// ── Dragging items ─────────────────────────────────────────────────────────
function makeDraggable(record) {
  const el = record.el;
  let dragging = false;
  let startCanvasX, startCanvasY;
  let startPositions; // Map<item, {x, y}>
  let beforeDrag;     // Map<itemId, {x, y}> for undo

  el.addEventListener('pointerdown', (e) => {
    if (e.button === 1) return; // middle click — let viewport handle panning
    if (e.target.tagName === 'TEXTAREA' ||
        e.target.tagName === 'BUTTON'   ||
        e.target.classList.contains('resize-handle')) return;

    const multiKey = e.shiftKey || e.ctrlKey;
    if (multiKey) {
      toggleSelection(record);
      e.stopPropagation();
      if (!selectedItems.has(record)) return; // just deselected, no drag
    } else {
      if (!selectedItems.has(record)) selectItem(record);
    }

    e.preventDefault();
    dragging = true;
    el.setPointerCapture(e.pointerId);

    const vr = viewport.getBoundingClientRect();
    startCanvasX = (e.clientX - vr.left - panX) / scale;
    startCanvasY = (e.clientY - vr.top  - panY) / scale;
    startPositions = new Map();
    beforeDrag = new Map();
    for (const item of selectedItems) {
      const sx = parseFloat(item.el.style.left) || 0;
      const sy = parseFloat(item.el.style.top)  || 0;
      startPositions.set(item, { x: sx, y: sy });
      beforeDrag.set(item.id, { x: sx, y: sy });
    }
  });

  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const vr = viewport.getBoundingClientRect();
    const cx = (e.clientX - vr.left - panX) / scale;
    const cy = (e.clientY - vr.top  - panY) / scale;
    const dx = cx - startCanvasX;
    const dy = cy - startCanvasY;
    for (const [item, start] of startPositions) {
      item.el.style.left = (start.x + dx) + 'px';
      item.el.style.top  = (start.y + dy) + 'px';
      item.x = start.x + dx;
      item.y = start.y + dy;
    }
    updateEdgesForItems(selectedItems);
  });

  el.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    for (const item of selectedItems) saveItem(item);
    const afterDrag = new Map();
    let hasMoved = false;
    for (const item of selectedItems) {
      const before = beforeDrag.get(item.id);
      afterDrag.set(item.id, { x: item.x, y: item.y });
      if (before && (before.x !== item.x || before.y !== item.y)) hasMoved = true;
    }
    if (hasMoved) {
      const bd = new Map(beforeDrag);
      const ad = new Map(afterDrag);
      pushUndo({
        label: 'move',
        undo() {
          for (const [id, pos] of bd) { const r = items.find(i => i.id === id); if (!r) continue; r.x = pos.x; r.y = pos.y; r.el.style.left = pos.x + 'px'; r.el.style.top = pos.y + 'px'; saveItem(r); }
          updateEdgesForItems(new Set(items.filter(i => bd.has(i.id))));
          return [...bd.keys()];
        },
        redo() {
          for (const [id, pos] of ad) { const r = items.find(i => i.id === id); if (!r) continue; r.x = pos.x; r.y = pos.y; r.el.style.left = pos.x + 'px'; r.el.style.top = pos.y + 'px'; saveItem(r); }
          updateEdgesForItems(new Set(items.filter(i => ad.has(i.id))));
          return [...ad.keys()];
        },
      });
    }
  });

  el.addEventListener('pointercancel', () => { dragging = false; });
}

// ── Panning and marquee selection ──────────────────────────────────────────
{
  const marqueeEl = document.getElementById('marquee');
  let mode = 'idle'; // 'idle' | 'panning' | 'marquee'
  let panMoved = false;
  let px0, py0;
  let mStartX, mStartY;

  viewport.addEventListener('pointerdown', (e) => {
    const isMiddle = e.button === 1;
    if (!isMiddle && e.target !== viewport && e.target !== surface) return;
    px0 = e.clientX - panX;
    py0 = e.clientY - panY;

    if (!isMiddle && (e.shiftKey || e.ctrlKey)) {
      mode = 'marquee';
      panMoved = false;
      const vr = viewport.getBoundingClientRect();
      mStartX = e.clientX - vr.left;
      mStartY = e.clientY - vr.top;
      marqueeEl.style.cssText = `display:block;left:${mStartX}px;top:${mStartY}px;width:0;height:0`;
      viewport.setPointerCapture(e.pointerId);
    } else {
      mode = 'panning';
      panMoved = false;
      viewport.style.cursor = 'grabbing';
      viewport.setPointerCapture(e.pointerId);
    }
  });

  viewport.addEventListener('pointermove', (e) => {
    if (mode === 'panning') {
      panMoved = true;
      panX = e.clientX - px0;
      panY = e.clientY - py0;
      applyTransform();
    } else if (mode === 'marquee') {
      panMoved = true;
      const vr = viewport.getBoundingClientRect();
      const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
      marqueeEl.style.left   = Math.min(mStartX, cx) + 'px';
      marqueeEl.style.top    = Math.min(mStartY, cy) + 'px';
      marqueeEl.style.width  = Math.abs(cx - mStartX) + 'px';
      marqueeEl.style.height = Math.abs(cy - mStartY) + 'px';
    }
  });

  viewport.addEventListener('pointerup', (e) => {
    if (mode === 'panning') {
      if (!panMoved) { clearSelection(); }
      if (panMoved) saveViewport();
      viewport.style.cursor = 'default';
    } else if (mode === 'marquee') {
      marqueeEl.style.display = 'none';
      const vr  = viewport.getBoundingClientRect();
      const cx  = e.clientX - vr.left, cy = e.clientY - vr.top;
      const rx1 = Math.min(mStartX, cx), ry1 = Math.min(mStartY, cy);
      const rx2 = Math.max(mStartX, cx), ry2 = Math.max(mStartY, cy);
      if (rx2 - rx1 > 4 || ry2 - ry1 > 4) {
        clearSelection();
        for (const item of items) {
          const ir = item.el.getBoundingClientRect();
          if (ir.right > vr.left + rx1 && ir.left < vr.left + rx2 &&
              ir.bottom > vr.top + ry1 && ir.top < vr.top + ry2) {
            addToSelection(item);
          }
        }
        for (const edge of edges) {
          const bbox = edge.pathEl.getBoundingClientRect();
          if (bbox.right  > vr.left + rx1 && bbox.left   < vr.left + rx2 &&
              bbox.bottom > vr.top  + ry1 && bbox.top    < vr.top  + ry2) {
            selectedEdges.add(edge);
            edge.pathEl.classList.add('selected');
          }
        }
      } else {
        clearSelection();
      }
    }
    mode = 'idle';
    panMoved = false;
  });

  viewport.addEventListener('pointercancel', () => {
    marqueeEl.style.display = 'none';
    viewport.style.cursor = 'default';
    mode = 'idle';
    panMoved = false;
  });

  window.addEventListener('blur', () => {
    marqueeEl.style.display = 'none';
    viewport.style.cursor = 'default';
    mode = 'idle';
    panMoved = false;
  });
}

// ── Toolbar hover (no blocking elements — pure pointermove hit-test) ───────
viewport.addEventListener('pointermove', (e) => {
  for (const record of items) {
    const rect = record.el.getBoundingClientRect();
    const inZone = e.clientX >= rect.left && e.clientX <= rect.right &&
                   e.clientY >= rect.top - 36 && e.clientY <= rect.bottom;
    record.el.classList.toggle('toolbar-active', inZone);
  }
});
viewport.addEventListener('pointerleave', () => {
  for (const record of items) record.el.classList.remove('toolbar-active');
});

// ── Zooming ────────────────────────────────────────────────────────────────
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta  = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newScale = Math.min(5, Math.max(0.1, scale * delta));

  const vr = viewport.getBoundingClientRect();
  const mx = e.clientX - vr.left;
  const my = e.clientY - vr.top;

  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
  saveViewport();
}, { passive: false });

// ── Toolbar buttons ────────────────────────────────────────────────────────
document.getElementById('btn-note').addEventListener('click', () => {
  const c = viewportCenter();
  const off = placeOffset++ * 24;
  const rec = createItem('note', c.x - 90 + off, c.y - 40 + off);
  const snap = snapItem(rec);
  pushUndo({
    label: 'create note',
    undo() { const r = items.find(i => i.id === snap.id); if (r) removeItem(r); return []; },
    redo() { restoreItemSnap(snap); return [snap.id]; },
  });
});

document.getElementById('btn-paste-img').addEventListener('click', async () => {
  try {
    const items_cb = await navigator.clipboard.read();
    for (const ci of items_cb) {
      const type = ci.types.find(t => t.startsWith('image/'));
      if (type) {
        placeImage(URL.createObjectURL(await ci.getType(type)));
        return;
      }
    }
    toast('No image in clipboard. Try Ctrl+V instead.');
  } catch {
    toast('Use Ctrl+V to paste from clipboard.');
  }
});

document.getElementById('btn-clear-sel').addEventListener('click', () => {
  clearSelection();
});

document.getElementById('btn-delete-sel').addEventListener('click', () => {
  if (selectedItems.size === 0 && selectedEdges.size === 0) { toast('No item selected'); return; }
  if (selectedEdges.size) {
    const snaps = [...selectedEdges].map(snapEdge);
    for (const er of [...selectedEdges]) removeEdge(er);
    pushUndo({
      label: snaps.length === 1 ? 'disconnect' : `disconnect ${snaps.length}`,
      undo() { for (const s of snaps) restoreEdgeSnap(s); return [...new Set(snaps.flatMap(s => [s.fromNode, s.toNode]))]; },
      redo() { for (const s of snaps) { const er = edges.find(e => e.id === s.id); if (er) removeEdge(er); } return []; },
    });
    return;
  }
  const snaps = [...selectedItems].map(snapItem);
  const edgeSnapMap = new Map();
  for (const item of selectedItems) {
    for (const er of (nodeEdgeMap.get(item.id) ?? [])) {
      if (!edgeSnapMap.has(er.id)) edgeSnapMap.set(er.id, snapEdge(er));
    }
  }
  const edgeSnaps = [...edgeSnapMap.values()];
  for (const item of [...selectedItems]) removeItem(item, { skipRevoke: true });
  pushUndo({
    label: snaps.length === 1 ? 'delete ' + (snaps[0].type === 'img' ? 'image' : 'note') : `delete ${snaps.length} items`,
    undo() { for (const s of snaps) restoreItemSnap(s); for (const es of edgeSnaps) restoreEdgeSnap(es); return snaps.map(s => s.id); },
    redo() { for (const s of snaps) { const r = items.find(i => i.id === s.id); if (r) removeItem(r, { skipRevoke: true }); } return []; },
    dispose() { for (const s of snaps) { if (s.blobUrl && !items.find(i => i.id === s.id)) URL.revokeObjectURL(s.blobUrl); } },
  });
});

document.getElementById('btn-reset-view').addEventListener('click', () => {
  scale = 1; panX = 0; panY = 0;
  applyTransform();
  saveViewport();
});

document.getElementById('add-tab-btn').addEventListener('click', () => {
  createTab(`Board ${tabs.length + 1}`);
});

// ── Duplicate selected items ────────────────────────────────────────────────
async function duplicateSelected() {
  if (selectedItems.size === 0) return;
  const OFFSET = 24;
  const toClone = [...selectedItems];
  clearSelection();

  const allSnaps = [];
  const imgLoadPromises = [];

  for (const item of toClone) {
    if (item.type === 'note') {
      const rec = createItem('note', item.x + OFFSET, item.y + OFFSET, { restore: true });
      rec.contentEl.value = item.contentEl.value;
      rec.contentEl.style.width  = item.contentEl.offsetWidth  + 'px';
      rec.contentEl.style.height = item.contentEl.offsetHeight + 'px';
      saveItem(rec);
      addToSelection(rec);
      allSnaps.push(snapItem(rec));
    } else {
      const rec = createItem('img', item.x + OFFSET, item.y + OFFSET, { restore: true });
      rec.contentEl.parentElement.style.width = item.contentEl.parentElement.offsetWidth + 'px';
      if (item.labelEl && rec.labelEl) rec.labelEl.value = item.labelEl.value;
      addToSelection(rec);
      const p = new Promise(resolve => {
        fetch(item.contentEl.src).then(r => r.blob()).then(blob => {
          const url = URL.createObjectURL(blob);
          rec.contentEl.onload = () => {
            rec.w = rec.el.offsetWidth;
            rec.h = rec.el.offsetHeight;
            saveItem(rec);
            allSnaps.push(snapItem(rec));
            resolve();
          };
          rec.contentEl.src = url;
        }).catch(resolve);
      });
      imgLoadPromises.push(p);
    }
  }

  await Promise.all(imgLoadPromises);
  if (allSnaps.length === 0) return;
  pushUndo({
    label: allSnaps.length === 1 ? 'duplicate' : `duplicate ${allSnaps.length} items`,
    undo()    { for (const s of allSnaps) { const r = items.find(i => i.id === s.id); if (r) removeItem(r, { skipRevoke: true }); } return []; },
    redo()    { for (const s of allSnaps) restoreItemSnap(s); return allSnaps.map(s => s.id); },
    dispose() { for (const s of allSnaps) { if (s.blobUrl && !items.find(i => i.id === s.id)) URL.revokeObjectURL(s.blobUrl); } },
  });
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); performUndo(); return; }
  if (e.ctrlKey && (e.key === 'y' || e.key === 'Z')) { e.preventDefault(); performRedo(); return; }
  if (e.ctrlKey && e.key === 'a') { e.preventDefault(); clearSelection(); for (const item of items) addToSelection(item); return; }
  if (e.ctrlKey && e.key === 'd') { e.preventDefault(); duplicateSelected(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedEdges.size) {
      const snaps = [...selectedEdges].map(snapEdge);
      for (const er of [...selectedEdges]) removeEdge(er);
      pushUndo({
        label: snaps.length === 1 ? 'disconnect' : `disconnect ${snaps.length}`,
        undo() { for (const s of snaps) restoreEdgeSnap(s); return [...new Set(snaps.flatMap(s => [s.fromNode, s.toNode]))]; },
        redo() { for (const s of snaps) { const er = edges.find(e => e.id === s.id); if (er) removeEdge(er); } return []; },
      });
      return;
    }
    if (selectedItems.size) {
      const snaps = [...selectedItems].map(snapItem);
      const edgeSnapMap = new Map();
      for (const item of selectedItems) {
        for (const er of (nodeEdgeMap.get(item.id) ?? [])) {
          if (!edgeSnapMap.has(er.id)) edgeSnapMap.set(er.id, snapEdge(er));
        }
      }
      const edgeSnaps = [...edgeSnapMap.values()];
      for (const item of [...selectedItems]) removeItem(item, { skipRevoke: true });
      pushUndo({
        label: snaps.length === 1 ? 'delete ' + (snaps[0].type === 'img' ? 'image' : 'note') : `delete ${snaps.length} items`,
        undo() { for (const s of snaps) restoreItemSnap(s); for (const es of edgeSnaps) restoreEdgeSnap(es); return snaps.map(s => s.id); },
        redo() { for (const s of snaps) { const r = items.find(i => i.id === s.id); if (r) removeItem(r, { skipRevoke: true }); } return []; },
        dispose() { for (const s of snaps) { if (s.blobUrl && !items.find(i => i.id === s.id)) URL.revokeObjectURL(s.blobUrl); } },
      });
    }
  }
  if (e.key === 'Escape') {
    clearSelection();
  }
  // Ctrl+C on selected item(s) — copy if single selection
  if (e.ctrlKey && e.key === 'c' && selectedItems.size === 1) {
    const item = [...selectedItems][0];
    if (item.type === 'img')  copyImage(item.contentEl);
    if (item.type === 'note') copyText(item.contentEl);
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
restoreAll().then(() => {
  if (items.length === 0) {
    toast('Ctrl+V to paste images or text  ·  Scroll to zoom  ·  Drag to pan', 3500);
  }
});
</script>
